name: Build system.img

on:
  workflow_dispatch:

jobs:
  build-systemimage:
    runs-on: ubuntu-22.04

    env:
      ROM_BRANCH: lineage-16.0
      DEVICE_CODENAME: OP4C7D
      DEVICE_PATH: device/oppo/OP4C7D
      CCACHE_DIR: /tmp/ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Aggressive Disk Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/google
          sudo docker system prune -af
          sudo apt clean

          df -h

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            curl \
            python2-minimal \
            bc \
            bison \
            build-essential \
            ccache \
            flex \
            g++-multilib \
            gcc-multilib \
            gnupg \
            gperf \
            imagemagick \
            lib32ncurses5-dev \
            lib32readline-dev \
            lib32z1-dev \
            liblz4-tool \
            libncurses5-dev \
            libsdl1.2-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lzop \
            pngcrush \
            rsync \
            schedtool \
            squashfs-tools \
            xsltproc \
            zip \
            zlib1g-dev \
            openjdk-8-jdk \
            libtinfo5 \
            libncurses5

      - name: Fix Python Compatibility
        run: |
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin

          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo

          chmod a+x ~/bin/repo

          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize LineageOS Source
        run: |
          mkdir android
          cd android

          repo init \
            -u https://github.com/LineageOS/android.git \
            -b $ROM_BRANCH \
            --depth=1

      - name: Clone Local Manifests
        run: |
          cd android

          mkdir -p .repo/local_manifests

          cp $GITHUB_WORKSPACE/manifests/roomservice.xml \
             .repo/local_manifests/

      - name: Repo Sync
        run: |
          cd android

          repo sync \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            -j4

      - name: Disable Broken WebView Package
        run: |
          cd android

          find external/chromium-webview \
            -name "Android.mk" \
            -exec mv {} {}.disabled \; || true

          find external/chromium-webview \
            -name "Android.bp" \
            -exec mv {} {}.disabled \; || true

      - name: Disable ClearKey DRM
        run: |
          cd android

          mv frameworks/av/drm/mediadrm/plugins/clearkey/hidl/Android.bp \
             frameworks/av/drm/mediadrm/plugins/clearkey/hidl/Android.bp.disabled || true

      - name: Apply Build Optimizations
        run: |
          cd android

          echo "WITH_DEXPREOPT := false" >> device/oppo/OP4C7D/BoardConfig.mk

          echo "WITH_DEXPREOPT_DEBUG_INFO := false" >> device/oppo/OP4C7D/BoardConfig.mk

          echo "TARGET_MINIMIZE_JAVA_DEBUG_INFO := true" >> device/oppo/OP4C7D/BoardConfig.mk

          echo "TARGET_DISABLE_DEBUG_SYMBOLS := true" >> device/oppo/OP4C7D/BoardConfig.mk

          echo "BOARD_DO_NOT_STRIP_VENDOR_MODULES := true" >> device/oppo/OP4C7D/BoardConfig.mk

      - name: Setup CCache
        run: |
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)

          ccache -M 20G
          ccache -o compression=true

          ccache -s

      - name: Build system.img
        run: |
          cd android

          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)

          export DISABLE_DEXPREOPT=true
          export WITH_DEXPREOPT=false
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true

          source build/envsetup.sh

          lunch lineage_${DEVICE_CODENAME}-userdebug

          rm -rf out/soong/.temp || true
          rm -rf out/host/linux-x86/tests || true

          df -h

          mka systemimage -j2 > build.log 2>&1
      
      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log

      - name: Verify Output
        run: |
          cd android

          ls -lh out/target/product/${DEVICE_CODENAME}/

          test -f out/target/product/${DEVICE_CODENAME}/system.img

      - name: Upload system.img
        uses: actions/upload-artifact@v4
        with:
          name: systemimage-${{ env.DEVICE_CODENAME }}
          path: |
            android/out/target/product/${{ env.DEVICE_CODENAME }}/system.img
          if-no-files-found: error
